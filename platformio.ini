[platformio]
default_envs = esp32dev
src_dir = src
data_dir = data
test_dir = test

[env:esp32dev]
platform = espressif32@^6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = min_spiffs.csv
lib_ldf_mode = chain+
lib_compat_mode = strict
lib_deps =
    bblanchon/ArduinoJson@^7.4.2
    knolleary/PubSubClient@^2.8
    robtillaart/ACS712@^0.3.10
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DSOLARSAVER_MAX_DEVICES=10
    -DSOLARSAVER_MATTER_READY=1
test_framework = unity

[env:native]
platform = native
build_src_filter = -<*>
build_flags =
    -std=gnu++17
    -DUNIT_TEST
test_framework = unity
test_filter = test_cases
